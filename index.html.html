<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mental Health Chat Bot</title>

<style>
    body{
        font-family: Arial, sans-serif;
        background:#f4f7fb;
        margin:0;
        padding:0;
    }

    .chat-container{
        width:400px;
        max-width:95%;
        margin:30px auto;
        background:white;
        border-radius:15px;
        box-shadow:0 4px 10px rgba(0,0,0,0.1);
        overflow:hidden;
    }

    .header{
        background:#4a90e2;
        color:white;
        padding:15px;
        text-align:center;
        font-size:20px;
    }

    .chat-box{
        height:450px;
        overflow-y:auto;
        padding:15px;
        background:#eef3f9;
    }

    .message{
        margin-bottom:10px;
        padding:10px 14px;
        border-radius:12px;
        max-width:80%;
        line-height:1.5;
    }

    .bot{
        background:white;
        align-self:flex-start;
    }

    .user{
        background:#4a90e2;
        color:white;
        margin-left:auto;
    }

    .input-area{
        display:flex;
        border-top:1px solid #ddd;
    }

    input{
        flex:1;
        padding:15px;
        border:none;
        outline:none;
        font-size:16px;
    }

    button{
        width:80px;
        border:none;
        background:#4a90e2;
        color:white;
        font-size:16px;
        cursor:pointer;
    }

    button:hover{
        background:#357abd;
    }

    .help-btn{
        display:inline-block;
        margin-top:10px;
        padding:10px 15px;
        background:red;
        color:white;
        text-decoration:none;
        border-radius:8px;
    }
</style>
</head>
<body>

<div class="chat-container">

    <div class="header">
        🤖 Mental Health Chat Bot
    </div>

    <div class="chat-box" id="chatBox">
        <div class="message bot">
            สวัสดี 😊 วันนี้รู้สึกอย่างไรบ้าง
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="พิมพ์ข้อความ...">
        <button onclick="sendMessage()">ส่ง</button>
    </div>

</div>

<script>

function addMessage(text, sender){
    const chatBox = document.getElementById("chatBox");

    const msg = document.createElement("div");
    msg.classList.add("message");
    msg.classList.add(sender);

    msg.innerHTML = text;

    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function botReply(message){

    message = message.toLowerCase();

    // ตรวจจับความเสี่ยงสูง
    if(
        message.includes("อยากตาย") ||
        message.includes("ฆ่าตัวตาย") ||
        message.includes("ไม่อยากมีชีวิต")
    ){
        return `
        ฉันเป็นห่วงคุณนะ 💙<br>
        กรุณาติดต่อผู้เชี่ยวชาญหรือสายด่วนสุขภาพจิตทันที<br><br>

        📞 สายด่วนสุขภาพจิต 1323 (24 ชั่วโมง)<br>

        <a class="help-btn" href="tel:1323">
            โทร 1323
        </a>
        `;
    }

    // เครียด
    if(message.includes("เครียด")){
        return `
        การรู้สึกเครียดเป็นเรื่องที่เกิดขึ้นได้ 😊<br>
        ลองพักหายใจลึก ๆ หรือพักผ่อนสักครู่<br><br>
        คุณอยากเล่าเพิ่มเติมไหม
        `;
    }

    // เศร้า
    if(
        message.includes("เศร้า") ||
        message.includes("ซึมเศร้า") ||
        message.includes("เหนื่อยใจ")
    ){
        return `
        ขอบคุณที่เล่าให้ฟัง 💙<br>
        คุณไม่ได้ต้องเผชิญเรื่องนี้คนเดียว<br><br>
        ลองพูดคุยกับคนที่ไว้ใจ หรือทำกิจกรรมที่ช่วยผ่อนคลาย
        `;
    }

    // นอนไม่หลับ
    if(message.includes("นอนไม่หลับ")){
        return `
        การนอนไม่หลับอาจเกิดจากความเครียดหรือความกังวล<br><br>
        ลอง:
        <ul>
            <li>ลดการเล่นมือถือก่อนนอน</li>
            <li>ฟังเพลงเบา ๆ</li>
            <li>นอนเวลาเดิมทุกวัน</li>
        </ul>
        `;
    }

    // ค่าเริ่มต้น
    return `
    ฉันพร้อมรับฟังนะ 😊<br>
    คุณสามารถเล่าเพิ่มเติมได้
    `;
}

function sendMessage(){

    const input = document.getElementById("userInput");
    const text = input.value.trim();

    if(text === "") return;

    addMessage(text, "user");

    setTimeout(() => {
        const reply = botReply(text);
        addMessage(reply, "bot");
    }, 500);

    input.value = "";
}

// Enter key
document.getElementById("userInput")
.addEventListener("keypress", function(event){
    if(event.key === "Enter"){
        sendMessage();
    }
});

</script>

</body>
</html>
