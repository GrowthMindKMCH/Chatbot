<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Therapist</title>

<style>

body{
    margin:0;
    font-family:Tahoma;
    background:#edf2f7;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:430px;
    max-width:95%;
    height:720px;
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,.15);
    display:flex;
    flex-direction:column;
}

.header{
    background:#4a90e2;
    color:white;
    padding:18px;
    text-align:center;
}

.chat-box{
    flex:1;
    overflow-y:auto;
    padding:15px;
    background:#f7fafc;
}

.message{
    max-width:85%;
    padding:14px;
    border-radius:18px;
    margin-bottom:12px;
    line-height:1.7;
}

.bot{
    background:white;
    border:1px solid #ddd;
}

.user{
    background:#4a90e2;
    color:white;
    margin-left:auto;
}

.input-area{
    display:flex;
    border-top:1px solid #ddd;
}

.input-area input{
    flex:1;
    border:none;
    padding:15px;
    font-size:16px;
    outline:none;
}

.input-area button{
    width:90px;
    border:none;
    background:#4a90e2;
    color:white;
    cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

    <div class="header">

        <h2>🧠 AI Therapist</h2>

    </div>

    <div class="chat-box" id="chatBox">

        <div class="message bot">

            สวัสดี 😊

        </div>

    </div>

    <div class="input-area">

        <input
            type="text"
            id="userInput"
            placeholder="พิมพ์ข้อความ..."
        >

        <button onclick="sendMessage()">

            ส่ง

        </button>

    </div>

</div>

<script>

function sendMessage(){

    const input =
        document.getElementById("userInput");

    const text = input.value;

    if(text === "") return;

    const chatBox =
        document.getElementById("chatBox");

    const userDiv =
        document.createElement("div");

    userDiv.classList.add("message");
    userDiv.classList.add("user");

    userDiv.innerText = text;

    chatBox.appendChild(userDiv);

    input.value = "";

    setTimeout(()=>{

        const botDiv =
            document.createElement("div");

        botDiv.classList.add("message");
        botDiv.classList.add("bot");

        botDiv.innerText =
            "ฉันกำลังรับฟังคุณอยู่นะ 😊";

        chatBox.appendChild(botDiv);

        chatBox.scrollTop =
            chatBox.scrollHeight;

    },1000);
}

</script>

</body>
</html>
