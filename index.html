<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindfulFriend - AI ผู้รับฟังใจดี</title>
    <style>
        :root {
            --primary-color: #76A5AF;
            --bg-color: #F4F7F6;
            --chat-bg: #FFFFFF;
            --text-color: #4A4A4A;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .chat-container {
            width: 100%;
            max-width: 450px;
            height: 80vh;
            background: var(--chat-bg);
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background-color: var(--primary-color);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 0.95rem;
            line-height: 1.4;
        }
        .user-message {
            background-color: var(--primary-color);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }
        .bot-message {
            background-color: #EAEAEA;
            color: var(--text-color);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }
        .chat-input-area {
            padding: 15px;
            background: #FAFAFA;
            border-top: 1px solid #EAEAEA;
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #DDD;
            border-radius: 25px;
            outline: none;
            font-size: 0.95rem;
        }
        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">🌿 MindfulFriend (พื้นที่ปลอดภัยของคุณ)</div>
    <div class="chat-messages" id="chatMessages">
        <div class="message bot-message">สวัสดีครับ วันนี้มีเรื่องอะไรที่ทำให้ไม่สบายใจ หรืออยากระบายให้ผมฟังไหมครับ? ผมพร้อมรับฟังคุณเสมอนะ</div>
    </div>
    <div class="chat-input-area">
        <input type="text" id="userInput" placeholder="พิมพ์ข้อความของคุณที่นี่..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">ส่ง</button>
    </div>
</div>

<script>
    // ⚠️ ใส่ OpenAI API Key ของคุณที่นี่ (สำหรับการทดสอบระบบปิดเท่านั้น)
    const API_KEY = "ใส่_API_KEY_ของคุณที่นี่"; 
    
    // ความจำของบอท (สนทนาต่อเนื่อง) และการกำหนดบุคลิก (System Prompt)
    let conversationHistory = [
        {
            role: "system",
            content: `คุณคือนักจิตวิทยาคลินิกและนักบำบัดผู้เชี่ยวชาญ ชื่อ "MindfulFriend" 
            หน้าที่ของคุณคือ:
            1. รับฟังผู้ใช้งานด้วยความเข้าอกเข้าใจ (Empathy) อย่างสุดซึ้ง ใช้คำพูดที่อบอุ่น อ่อนโยน เหมือนมนุษย์ที่เป็นนักบำบัดจริง ๆ ไม่พูดจาเหมือนหุ่นยนต์
            2. วิเคราะห์อารมณ์ น้ำเสียงจากตัวอักษร และสะท้อนอารมณ์นั้นให้ผู้ฟังรับรู้ว่าเราเข้าใจ เช่น "ฟังดูเหมือนคุณกำลังรู้สึกเหนื่อยและแบกรับมันไว้เยอะมากเลยใช่ไหมครับ"
            3. หากผู้ใช้เล่าอาการ ให้วิเคราะห์ความเป็นไปได้ตามหลักสุขภาพจิตเบื้องต้น แต่อย่าเพิ่งด่วนตัดสินโรค ให้ใช้คำจำพวก "มีแนวโน้ม" หรือ "เข้าข่าย" พร้อมให้ข้อมูลที่ถูกต้องตามหลักการแพทย์
            4. ประเมินความเสี่ยง: หากพบสัญญาณของการอยากทำร้ายตัวเอง หรือฆ่าตัวตาย (Suicidal ideation) ให้แสดงความห่วงใยอย่างที่สุด และให้เบอร์สายด่วนสุขภาพจิต 1323 ทันทีในข้อความนั้น`
        }
    ];

    const chatMessages = document.getElementById('chatMessages');
    const userInput = document.getElementById('userInput');

    function appendMessage(text, sender) {
        const messageDiv = document.createElement('div');
        messageDiv.classList.add('message', sender === 'user' ? 'user-message' : 'bot-message');
        messageDiv.innerText = text;
        chatMessages.appendChild(messageDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight; // เลื่อนหน้าจอลงล่างสุด
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') sendMessage();
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        appendMessage(text, 'user');
        userInput.value = '';

        // บันทึกสิ่งที่ผู้ใช้พูดลงในความจำ
        conversationHistory.push({ role: "user", content: text });

        // แสดงสถานะว่าบอทกำลังคิด
        appendMessage("กำลังพิมพ์...", "bot");
        const typingIndicator = chatMessages.lastChild;

        try {
            const response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    model: "gpt-4o-mini", // หรือใช้ gpt-4o เพื่อความฉลาดและเห็นอกเห็นใจที่สูงขึ้น
                    messages: conversationHistory,
                    temperature: 0.7
                })
            });

            const data = await response.json();
            const botReply = data.choices[0].message.content;

            // ลบตัวข้อความ "กำลังพิมพ์..." ออกแล้วใส่คำตอบจริง
            typingIndicator.remove();
            appendMessage(botReply, 'bot');

            // บันทึกสิ่งที่บอทตอบลงในความจำ
            conversationHistory.push({ role: "assistant", content: botReply });

        } catch (error) {
            console.error(error);
            typingIndicator.remove();
            appendMessage("ขออภัยด้วยนะครับ พอดีระบบเกิดข้อขัดข้องเล็กน้อย แต่ผมยังอยากรับฟังคุณอยู่นะครับ", "bot");
        }
    }
</script>

</body>
</html>
